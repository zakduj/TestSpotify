services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: testspotify-api
    env_file:
      - .env
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    volumes:
      - .:/app
      - api_node_modules:/app/node_modules
    command: npm run dev
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: testspotify-web
    env_file:
      - .env
    ports:
      - "4000:4000"
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
      - /app/.nuxt
    restart: unless-stopped

volumes:
  api_node_modules:
  web_node_modules:
